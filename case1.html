<!DOCTYPE html>
<html>
<head>
<title>Case 1 — Midnight Bakery</title>

<style>

body {
background: linear-gradient(to bottom, #2c2c54, #3b3b6d);
color: #f1efff;
font-family: "Segoe UI", sans-serif;
text-align: center;
padding: 30px;
overflow-x: hidden;
}

/* Clouds */

.cloud {
position: absolute;
background: #ffffff20;
border-radius: 50px;
opacity: 0.4;
animation: float 40s linear infinite;
}

.cloud1 {
width: 120px;
height: 50px;
top: 80px;
left: -150px;
}

.cloud2 {
width: 150px;
height: 60px;
top: 200px;
left: -200px;
animation-delay: 10s;
}

@keyframes float {
from { transform: translateX(0); }
to { transform: translateX(120vw); }
}

h1 {
color: #e4dcff;
text-shadow: 0 0 10px #cfc2ff;
}

.box {
background: #ffffff10;
padding: 20px;
border-radius: 20px;
width: 750px;
margin: auto;
backdrop-filter: blur(8px);
}

.suspects {
display: flex;
justify-content: center;
gap: 30px;
margin-top: 20px;
}

.suspect {
cursor: pointer;
transition: 0.3s;
}

.sprite {
width: 100px;
transition: 0.3s;
}

.sprite:hover {
transform: scale(1.1);
}

.map {
margin-top: 25px;
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 10px;
}

.room {
background: #ffffff10;
padding: 20px;
border-radius: 15px;
cursor: pointer;
}

.room:hover {
background: #ffffff20;
}

.evidence {
margin-top: 20px;
background: #ffffff10;
padding: 15px;
border-radius: 15px;
min-height: 60px;
}

button {
background: #8c88d9;
color: white;
border: none;
padding: 10px 20px;
border-radius: 15px;
margin-top: 15px;
cursor: pointer;
}

input {
padding: 10px;
border-radius: 15px;
border: none;
margin-top: 15px;
}

</style>

</head>

<body>

<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>

<h1>✧ Case 1 — Midnight Bakery ✧</h1>

<div class="box">

<p id="intro"></p>

<h3>✧ Suspects ✧</h3>

<div class="suspects">

<div class="suspect" onclick="suspect('luna')">
<img class="sprite" src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png">
<br>Luna
</div>

<div class="suspect" onclick="suspect('milo')">
<img class="sprite" src="https://cdn-icons-png.flaticon.com/512/4140/4140037.png">
<br>Milo
</div>

<div class="suspect" onclick="suspect('iris')">
<img class="sprite" src="https://cdn-icons-png.flaticon.com/512/4140/4140051.png">
<br>Iris
</div>

</div>

<h3>✧ Bakery Map ✧</h3>

<div class="map">

<div class="room" onclick="room('kitchen')">Kitchen</div>
<div class="room" onclick="room('counter')">Front Counter</div>
<div class="room" onclick="room('storage')">Storage Room</div>
<div class="room" onclick="room('office')">Office</div>
<div class="room" onclick="room('oven')">Oven Area</div>
<div class="room" onclick="room('backdoor')">Back Door</div>

</div>

<div class="evidence" id="evidence">
✧ Evidence Board ✧<br>
No clues yet...
</div>

<input type="text" id="answer" placeholder="Who stole it?">

<br>

<button onclick="checkAnswer()">Submit</button>

</div>

<audio id="clickSound" src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3"></audio>
<audio id="squeakSound" src="https://assets.mixkit.co/sfx/preview/mixkit-mouse-click-close-1113.mp3"></audio>

<script>

/* Typing */

let text = "Someone stole pastries at midnight... Explore the bakery and question suspects."
let i = 0

function typing(){
if(i < text.length){
document.getElementById("intro").innerHTML += text.charAt(i)
i++
setTimeout(typing,25)
}
}

typing()

/* Sounds */

function click(){
document.getElementById("clickSound").play()
}

function squeak(){
document.getElementById("squeakSound").play()
}

let clues = []

function suspect(name){

squeak()

if(name==="luna") clues.push("Luna works at midnight")
if(name==="milo") clues.push("Milo says he was asleep")
if(name==="iris") clues.push("Iris arrives early morning")

update()

}

function room(place){

click()

if(place==="kitchen") clues.push("Flour footprints in kitchen")
if(place==="counter") clues.push("Pastries missing")
if(place==="storage") clues.push("Flour apron found")
if(place==="office") clues.push("Luna scheduled midnight")
if(place==="oven") clues.push("Oven still warm")
if(place==="backdoor") clues.push("Back door locked")

update()

}

function update(){

document.getElementById("evidence").innerHTML =
"✧ Evidence Board ✧<br>" + [...new Set(clues)].join("<br>")

}

function checkAnswer(){

let answer =
document.getElementById("answer").value.toLowerCase()

if(answer==="luna" && clues.length>=3){
alert("✧ Luna looks nervous... 'I was covering for someone...'")
window.location.href="case2.html"
}
else{
alert("✧ Keep investigating...")
}

}

</script>

</body>
</html>
