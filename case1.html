<!DOCTYPE html>
<html>
<head>
<title>Case 1 — Midnight Bakery</title>

<style>

body {
background: linear-gradient(to bottom, #2c2c54, #3b3b6d);
color: #f1efff;
font-family: "Segoe UI", sans-serif;
text-align: center;
padding: 50px;
}

h1 {
color: #e4dcff;
text-shadow: 0 0 10px #cfc2ff;
}

.box {
background: #ffffff10;
padding: 25px;
border-radius: 20px;
width: 600px;
margin: auto;
backdrop-filter: blur(8px);
}

button {
background: #8c88d9;
color: white;
border: none;
padding: 10px 18px;
border-radius: 15px;
margin: 8px;
cursor: pointer;
transition: 0.3s;
}

button:hover {
background: #a29eff;
}

.suspect {
background: #ffffff10;
padding: 12px;
margin: 8px;
border-radius: 15px;
cursor: pointer;
transition: 0.3s;
}

.suspect:hover {
background: #ffffff20;
}

.cluebox {
margin-top: 20px;
color: #ddd8ff;
}

input {
padding: 10px;
border-radius: 15px;
border: none;
margin-top: 15px;
}

.progress {
margin-top: 15px;
color: #cfc2ff;
}

</style>

</head>

<body>

<h1>✧ Case 1 — Midnight Bakery ✧</h1>

<div class="box">

<p>
At exactly midnight, the bakery was robbed.<br>
Flour footprints led to the kitchen...<br>
Three suspects remain...
</p>

<h3>✧ Suspects ✧</h3>

<div class="suspect" onclick="suspect('luna')">
Luna — The night baker
</div>

<div class="suspect" onclick="suspect('milo')">
Milo — The sleepy guard
</div>

<div class="suspect" onclick="suspect('iris')">
Iris — The early customer
</div>

<div class="cluebox" id="clue"></div>

<div class="progress" id="progress">
Clues found: 0 / 3
</div>

<br>

<input type="text" id="answer" placeholder="Who stole it?">

<br>

<button onclick="checkAnswer()">Submit Answer</button>

</div>

<script>

let clues = 0;

function suspect(name){

if(name === "luna"){
document.getElementById("clue").innerHTML =
"✧ Luna works at midnight and wears a flour-covered apron.";
clues++
}

if(name === "milo"){
document.getElementById("clue").innerHTML =
"✧ Milo was asleep... or was he?";
clues++
}

if(name === "iris"){
document.getElementById("clue").innerHTML =
"✧ Iris arrives early morning, not midnight.";
clues++
}

document.getElementById("progress").innerHTML =
"Clues found: " + clues + " / 3"

}

function checkAnswer(){

let answer = document.getElementById("answer").value.toLowerCase();

if(answer === "luna" && clues >= 2){
alert("✧ Correct... Luna baked something mysterious at midnight...");
}
else if(clues < 2){
alert("✧ Find more clues before guessing...");
}
else{
alert("✧ Not quite... Keep investigating...");
}

}

</script>

</body>

</html>
