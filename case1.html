<!DOCTYPE html>
<html>
<head>
<title>Case 1 — Midnight Bakery</title>

<style>

body {
background: linear-gradient(to bottom, #2c2c54, #3b3b6d);
color: #f1efff;
font-family: "Segoe UI", sans-serif;
text-align: center;
padding: 30px;
}

h1 {
color: #e4dcff;
text-shadow: 0 0 10px #cfc2ff;
}

.box {
background: #ffffff10;
padding: 20px;
border-radius: 20px;
width: 750px;
margin: auto;
backdrop-filter: blur(8px);
}

/* Chibi Sprites */

.suspects {
display: flex;
justify-content: center;
gap: 20px;
margin-top: 20px;
}

.suspect {
cursor: pointer;
transition: 0.3s;
}

.suspect:hover {
transform: scale(1.1);
}

.chibi {
width: 90px;
height: 90px;
background: #ffffff15;
border-radius: 20px;
display: flex;
align-items: center;
justify-content: center;
margin: auto;
font-size: 30px;
}

/* Map */

.map {
margin-top: 25px;
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 10px;
}

.room {
background: #ffffff10;
padding: 20px;
border-radius: 15px;
cursor: pointer;
transition: 0.3s;
}

.room:hover {
background: #ffffff20;
}

/* Evidence */

.evidence {
margin-top: 20px;
background: #ffffff10;
padding: 15px;
border-radius: 15px;
}

button {
background: #8c88d9;
color: white;
border: none;
padding: 10px 20px;
border-radius: 15px;
margin-top: 15px;
cursor: pointer;
}

input {
padding: 10px;
border-radius: 15px;
border: none;
margin-top: 15px;
}

</style>

</head>

<body>

<h1>✧ Case 1 — Midnight Bakery ✧</h1>

<div class="box">

<p>
Someone stole pastries at midnight...<br>
Explore the bakery and question suspects.
</p>

<h3>✧ Suspects ✧</h3>

<div class="suspects">

<div class="suspect" onclick="suspect('luna')">
<div class="chibi">✿</div>
Luna
</div>

<div class="suspect" onclick="suspect('milo')">
<div class="chibi">✦</div>
Milo
</div>

<div class="suspect" onclick="suspect('iris')">
<div class="chibi">✧</div>
Iris
</div>

</div>

<h3>✧ Bakery Map ✧</h3>

<div class="map">

<div class="room" onclick="room('kitchen')">
Kitchen
</div>

<div class="room" onclick="room('counter')">
Front Counter
</div>

<div class="room" onclick="room('storage')">
Storage Room
</div>

<div class="room" onclick="room('office')">
Office
</div>

<div class="room" onclick="room('oven')">
Oven Area
</div>

<div class="room" onclick="room('backdoor')">
Back Door
</div>

</div>

<div class="evidence" id="evidence">
✧ Evidence Board ✧<br>
No clues yet...
</div>

<input type="text" id="answer" placeholder="Who stole it?">

<br>

<button onclick="checkAnswer()">Submit Answer</button>

</div>

<script>

let clues = []

function suspect(name){

if(name==="luna" && !clues.includes("luna")){
clues.push("Luna works at midnight")
}

if(name==="milo" && !clues.includes("milo")){
clues.push("Milo says he was asleep")
}

if(name==="iris" && !clues.includes("iris")){
clues.push("Iris arrives early morning")
}

update()

}

function room(place){

if(place==="kitchen" && !clues.includes("Flour footprints")){
clues.push("Flour footprints in kitchen")
}

if(place==="counter" && !clues.includes("Missing pastries")){
clues.push("Pastries missing from counter")
}

if(place==="storage" && !clues.includes("Apron")){
clues.push("Flour-covered apron found")
}

if(place==="office" && !clues.includes("Schedule")){
clues.push("Luna scheduled at midnight")
}

if(place==="oven" && !clues.includes("Warm oven")){
clues.push("Oven still warm at midnight")
}

if(place==="backdoor" && !clues.includes("Locked door")){
clues.push("Back door still locked")
}

update()

}

function update(){

document.getElementById("evidence").innerHTML =
"✧ Evidence Board ✧<br>" + clues.join("<br>")

}

function checkAnswer(){

let answer =
document.getElementById("answer").value.toLowerCase()

if(answer==="luna" && clues.length>=3){
alert("✧ Correct... Luna secretly baked pastries at midnight...")
}

else{
alert("✧ Keep investigating...")
}

}

</script>

</body>

</html>
