<!DOCTYPE html>
<html>
<head>
<title>Midnight Mystery</title>

<style>
body {
  background: linear-gradient(to bottom, #2a2a4a, #3b3b6d);
  color: #f0efff;
  font-family: "Segoe UI", sans-serif;
  text-align: center;
  padding-top: 120px;
  overflow: hidden;
}

/* Title */
h1 {
  font-size: 42px;
  color: #e0d6ff;
  text-shadow: 0 0 15px #cbb8ff;
}

p {
  color: #e6e3ff;
}

/* Button */
button {
  background: #6e6bbd;
  color: white;
  border: none;
  padding: 12px 24px;
  border-radius: 20px;
  cursor: pointer;
  margin-top: 20px;
  transition: 0.3s;
  box-shadow: 0 0 10px #a9a2ff;
}

button:hover {
  background: #8784d9;
  box-shadow: 0 0 20px #c4bdff;
}

/* Stars */
.star {
  position: absolute;
  width: 3px;
  height: 3px;
  background: #fff;
  border-radius: 50%;
  box-shadow: 0 0 6px #fff;
  animation: twinkle 4s infinite;
}

@keyframes twinkle {
  0% {opacity:0.3;}
  50% {opacity:1;}
  100% {opacity:0.3;}
}

/* Clouds */
.cloud {
  position: absolute;
  background: #ffffff20;
  width: 140px;
  height: 40px;
  border-radius: 50px;
  animation: float 80s linear infinite;
}

.cloud:before {
  content: "";
  position: absolute;
  background: #ffffff20;
  width: 60px;
  height: 60px;
  top: -20px;
  left: 20px;
  border-radius: 50%;
}

.cloud:after {
  content: "";
  position: absolute;
  background: #ffffff20;
  width: 70px;
  height: 70px;
  top: -30px;
  right: 20px;
  border-radius: 50%;
}

@keyframes float {
  from { transform: translateX(-200px); }
  to { transform: translateX(100vw); }
}

/* Detective Badge */
.badge {
  position: absolute;
  top: 20px;
  left: 20px;
  background: #ffffff15;
  padding: 10px 15px;
  border-radius: 15px;
  font-size: 14px;
  backdrop-filter: blur(5px);
}

</style>

</head>

<body>

<div class="badge">🕵️ Detective Portal</div>

<h1>Midnight ✦ Mystery</h1>
<p>⋆˚꩜｡ just you, the moon, and a clue.</p>

<button onclick="location.href='case1.html'">
Start Case 1
</button>

<script>

/* Stars */
for(let i=0;i<80;i++){
let star = document.createElement("div");
star.className="star";
star.style.top=Math.random()*100+"vh";
star.style.left=Math.random()*100+"vw";
star.style.animationDelay=Math.random()*4+"s";
document.body.appendChild(star);
}

/* Clouds */
for(let i=0;i<4;i++){
let cloud = document.createElement("div");
cloud.className="cloud";
cloud.style.top=Math.random()*60+"vh";
cloud.style.animationDelay=Math.random()*50+"s";
document.body.appendChild(cloud);
}

</script>

</body>
</html>
